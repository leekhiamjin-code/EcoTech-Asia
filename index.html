                <p class="text-base sm:text-xl text-slate-600 leading-relaxed mb-8 sm:mb-10" x-text="t().about"></p>
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
                    <a href="#services" class="px-6 py-3.5 sm:px-8 sm:py-4 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200 text-center" x-text="lang === 'en' ? 'Our Services' : '查看服务'"></a>
                    <a href="#contact" class="px-6 py-3.5 sm:px-8 sm:py-4 bg-white text-slate-900 border border-slate-200 rounded-xl font-bold hover:bg-slate-50 transition-all text-center" x-text="lang === 'en' ? 'Contact Us' : '联系我们'"></a>
                </div>
            </div>
        </div>
    </header>

    <!-- About Section -->
    <section id="about" class="py-12 sm:py-24 bg-slate-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid lg:grid-cols-2 gap-10 lg:gap-16 items-center">
                <div>
                    <h2 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8 flex items-center gap-3">
                        <span class="w-6 sm:w-8 h-1 bg-emerald-600 rounded-full"></span>
                        <span x-text="lang === 'en' ? 'About EcoTech Asia' : '关于 EcoTech Asia'"></span>
                    </h2>
                    <div class="space-y-4 sm:space-y-6 text-slate-600 text-base sm:text-lg leading-relaxed">
                        <p x-text="t().aboutDetail"></p>
                        <p x-text="t().approach"></p>
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-6">
                    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-100">
                        <h3 class="text-lg sm:text-xl font-bold text-emerald-700 mb-3 sm:mb-4 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            <span x-text="t().vision"></span>
                        </h3>
                        <p class="text-slate-600 leading-relaxed italic text-sm sm:text-base" x-text="'&quot;' + t().visionText + '&quot;'"></p>
                    </div>
                    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-100">
                        <h3 class="text-lg sm:text-xl font-bold text-emerald-700 mb-3 sm:mb-4 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                            <span x-text="t().mission"></span>
                        </h3>
                        <p class="text-slate-600 leading-relaxed text-sm sm:text-base" x-text="t().missionText"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Services Section -->
    <section id="services" class="py-12 sm:py-24 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center max-w-3xl mx-auto mb-10 sm:mb-20">
                <h2 class="text-3xl sm:text-4xl font-extrabold mb-4 sm:mb-6" x-text="t().servicesTitle"></h2>
                <p class="text-base sm:text-lg text-slate-600 px-2" x-text="t().servicesSub"></p>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="(service, idx) in t().services" :key="service.id">
                    <div class="service-card bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-100 flex flex-col h-full shadow-sm">
                        <div class="w-10 h-10 sm:w-12 sm:h-12 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center mb-4 sm:mb-6 font-bold text-lg sm:text-xl" x-text="idx + 1"></div>
                        <h3 class="text-lg sm:text-xl font-bold mb-3 sm:mb-4 leading-tight" x-text="service.title"></h3>
                        <p class="text-slate-600 text-xs sm:text-sm mb-4 sm:mb-6 flex-grow" x-text="service.desc"></p>
                        
                        <ul class="space-y-2.5 sm:space-y-3 mb-6 sm:mb-8">
                            <template x-for="(item, i) in service.items" :key="i">
                                <li class="flex items-start gap-2 text-[13px] sm:text-sm text-slate-700">
                                    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-emerald-500 mt-0.5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                                    <span x-text="item"></span>
                                </li>
                            </template>
                        </ul>

                        <div class="pt-4 sm:pt-6 border-t border-slate-200">
                            <span class="text-[10px] sm:text-xs font-bold text-emerald-700 uppercase tracking-wider mb-1.5 sm:mb-2 block" x-text="lang === 'en' ? 'Outcome' : '服务成果'"></span>
                            <p class="text-[13px] sm:text-sm font-medium text-slate-900" x-text="service.outcome"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Leadership Section -->
    <section id="leadership" class="py-12 sm:py-24 bg-slate-900 text-white overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid lg:grid-cols-3 gap-10 lg:gap-16">
                <div class="lg:col-span-1">
                    <h2 class="text-3xl sm:text-4xl font-extrabold mb-6 sm:mb-8" x-text="t().leadershipTitle"></h2>
                    <p class="text-slate-400 text-base sm:text-lg mb-6 sm:mb-8" x-text="t().leadershipSub"></p>
                    <p class="text-slate-300 leading-relaxed border-l-2 border-emerald-500 pl-4 sm:pl-6 py-2 text-sm sm:text-base" x-text="t().leadershipIntro"></p>
                </div>
                
                <div class="lg:col-span-2 space-y-8">
                    <template x-for="(partner, idx) in t().partners" :key="idx">
                        <div class="bg-white/5 p-6 sm:p-10 rounded-2xl border border-white/10 backdrop-blur-sm">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 sm:mb-8">
                                <div>
                                    <h3 class="text-2xl sm:text-3xl font-bold text-emerald-400" x-text="partner.name"></h3>
                                    <p class="text-emerald-100/60 font-medium text-sm sm:text-base" x-text="partner.title"></p>
                                </div>
                                <div class="text-left sm:text-right">
                                    <span class="inline-block px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-xs sm:text-sm font-bold border border-emerald-500/20" x-text="partner.role"></span>
                                </div>
                            </div>
                            
                            <p class="text-slate-300 mb-6 sm:mb-8 text-base sm:text-lg leading-relaxed" x-text="partner.desc"></p>
                            
                            <div class="grid md:grid-cols-2 gap-6 mb-6">
                                <div>
                                    <h4 class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 sm:mb-4 flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                                        <span x-text="lang === 'en' ? 'Background' : '职业背景'"></span>
                                    </h4>
                                    <ul class="space-y-2">
                                        <template x-for="(item, i) in partner.background" :key="i">
                                            <li class="text-[13px] sm:text-sm text-slate-400 flex items-start gap-2">
                                                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 mt-1.5 flex-shrink-0"></div>
                                                <span x-text="item"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                                <div>
                                    <h4 class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 sm:mb-4 flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                        <span x-text="lang === 'en' ? 'Interests' : '专业领域'"></span>
                                    </h4>
                                    <ul class="space-y-2">
                                        <template x-for="(item, i) in (partner.interests || [])" :key="i">
                                            <li class="text-[13px] sm:text-sm text-slate-400 flex items-start gap-2">
                                                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 mt-1.5 flex-shrink-0"></div>
                                                <span x-text="item"></span>
                                            </li>
                                        </template>
                                        <template x-if="partner.contribution">
                                            <li class="text-[13px] sm:text-sm font-bold text-emerald-400" x-text="partner.contribution"></li>
                                        </template>
                                    </ul>
                                </div>
                            </div>

                            <template x-if="partner.education">
                                <div class="pt-6 sm:pt-8 border-t border-white/10">
                                    <div class="flex items-start gap-3 sm:gap-4">
                                        <svg class="w-5 h-5 sm:w-6 sm:h-6 text-emerald-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                                        <div class="min-w-0">
                                            <p class="text-[13px] sm:text-sm text-slate-300 mb-1 sm:mb-2" x-text="partner.education"></p>
                                            <p class="text-[12px] sm:text-sm text-slate-400 italic" x-text="partner.oversight"></p>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="py-12 sm:py-24 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-emerald-600 rounded-2xl sm:rounded-[3rem] p-6 sm:p-12 lg:p-20 text-white overflow-hidden relative shadow-lg">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl pointer-events-none"></div>
                
                <div class="grid lg:grid-cols-2 gap-10 relative">
                    <div>
                        <h2 class="text-3xl sm:text-4xl font-extrabold mb-8" x-text="t().contactTitle"></h2>
                        <div class="space-y-6 sm:space-y-8">
                            <div class="flex items-start gap-4">
                                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0">
                                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                </div>
                                <div class="min-w-0">
                                    <p class="text-emerald-100 text-[10px] font-bold uppercase tracking-wider mb-1">Tel & WhatsApp</p>
                                    <a :href="'tel:' + t().contactDetails.tel" class="text-lg sm:text-2xl font-bold hover:underline break-words" x-text="t().contactDetails.tel"></a>
                                </div>
                            </div>
                            <div class="flex items-start gap-4">
                                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0">
                                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </div>
                                <div class="min-w-0">
                                    <p class="text-emerald-100 text-[10px] font-bold uppercase tracking-wider mb-1">WeChat</p>
                                    <p class="text-lg sm:text-2xl font-bold break-words" x-text="t().contactDetails.wechat"></p>
                                </div>
                            </div>
                            <div class="flex items-start gap-4">
                                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0">
                                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                </div>
                                <div class="min-w-0">
                                    <p class="text-emerald-100 text-[10px] font-bold uppercase tracking-wider mb-1">Email</p>
                                    <a :href="'mailto:' + t().contactDetails.email" class="text-lg sm:text-2xl font-bold hover:underline break-all" x-text="t().contactDetails.email"></a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white/10 backdrop-blur-md p-6 sm:p-10 rounded-2xl border border-white/20">
                        <div class="flex items-start gap-4 mb-6">
                            <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0">
                                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            </div>
                            <div>
                                <h3 class="text-lg sm:text-xl font-bold mb-3" x-text="lang === 'en' ? 'Corporate Office' : '公司总部地址'"></h3>
                                <p class="text-emerald-50 leading-relaxed text-sm sm:text-lg hyphens-auto" x-text="t().contactDetails.address"></p>
                            </div>
                        </div>
                        <div class="pt-6 border-t border-white/20">
                            <p class="text-xs sm:text-sm font-medium text-emerald-100 opacity-80" x-text="lang === 'en' ? 'Operating across Malaysia, China, Japan, and ASEAN.' : '业务覆盖马来西亚、中国、日本及东盟地区。'"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-10 bg-slate-50 border-t border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="flex flex-col items-center gap-4">
                <div class="flex items-center gap-2 text-emerald-700 font-bold">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 7a7 7 0 0 1-7 7c-1.07 0-2.09-.25-3-.7L11 20z"/><path d="M11 20c-1.07 0-2.09-.25-3-.7L5 22l1.3-3c-1.21-1.35-1.9-3.1-1.9-5a7.12 7.12 0 0 1 .7-3"/></svg>
                    <span x-text="t().name"></span>
                </div>
                <p class="text-slate-500 font-medium text-sm sm:text-base px-4" x-text="t().footer"></p>
                <p class="text-slate-400 text-[10px] mt-4">
                    © <span x-text="new Date().getFullYear()"></span> <span x-text="t().name"></span> <span x-text="t().registration"></span>. All rights reserved.
                </p>
            </div>
        </div>
    </footer>
</body>
</html>
